<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | PAYCLE</title>
  <meta name="description" content="ペイクルへのお問い合わせ。技術相談・協業・取材のご依頼など、お気軽にご連絡ください。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .contact-form {
      max-width: 640px;
      display: grid;
      gap: 28px;
    }
    .contact-form label {
      display: block;
      font-weight: 700;
      font-size: 0.9rem;
      margin-bottom: 8px;
    }
    .contact-form input,
    .contact-form textarea {
      width: 100%;
      padding: 14px 16px;
      font: inherit;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 6px;
    }
    .contact-form input:focus,
    .contact-form textarea:focus {
      outline: 2px solid var(--accent);
      border-color: transparent;
    }
    .contact-form button {
      justify-self: start;
      font: inherit;
      font-weight: 700;
      padding: 16px 56px;
      background: var(--ink);
      color: var(--bg);
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: opacity 0.25s ease;
    }
    .contact-form button:hover {
      opacity: 0.8;
    }
    .form-note {
      font-size: 0.85rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <header class="site-header">
    <a href="index.html" class="logo"><img src="images/logo.png" alt="PAYCLE"></a>
    <nav class="global-nav" id="globalNav">
      <a href="services.html">Services</a>
      <a href="rd.html">R&amp;D</a>
      <a href="cases.html">Cases</a>
      <a href="news.html">News</a>
      <a href="about.html">About</a>
      <a href="contact.html" class="nav-contact">Contact</a>
    </nav>
    <button class="nav-toggle" id="navToggle" aria-label="メニューを開く" aria-expanded="false">
      <span></span><span></span>
    </button>
  </header>

  <main>
    <div class="page-hero">
      <h1 class="page-title-en">CONTACT</h1>
      <p class="page-title-jp">お問い合わせ</p>
    </div>

    <section class="page-section">
      <p style="margin-bottom: 40px;">
        技術相談・協業・取材のご依頼など、お気軽にお問い合わせください。
        内容を確認のうえ、担当者よりご連絡いたします。
      </p>

      <!-- TODO: フォーム送信先（フォームサービスまたはバックエンド）を設定してください -->
      <form class="contact-form" action="#" method="post">
        <div>
          <label for="name">お名前</label>
          <input type="text" id="name" name="name" required autocomplete="name">
        </div>
        <div>
          <label for="company">会社名・団体名</label>
          <input type="text" id="company" name="company" autocomplete="organization">
        </div>
        <div>
          <label for="email">メールアドレス</label>
          <input type="email" id="email" name="email" required autocomplete="email">
        </div>
        <div>
          <label for="message">お問い合わせ内容</label>
          <textarea id="message" name="message" rows="8" required></textarea>
        </div>
        <p class="form-note">ご入力いただいた情報は、お問い合わせへの対応のみに使用します。</p>
        <button type="submit">送信する</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p class="footer-logo"><img src="images/logo.png" alt="PAYCLE"></p>
      <nav class="footer-nav">
        <a href="services.html">Services</a>
        <a href="rd.html">R&amp;D</a>
        <a href="cases.html">Cases</a>
        <a href="news.html">News</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="footer-legal">
        <a href="privacy-policy.html">Privacy Policy</a>
        <p class="copyright">&copy; PAYCLE Inc.</p>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
